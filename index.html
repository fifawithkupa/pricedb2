<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>pricedb — 옆 회사는 얼마에 했을까</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="ds/colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--color-bg-normal);
      color: var(--color-label-normal);
      font-family: var(--font-family-base);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; }
    button { font-family: inherit; cursor: pointer; }

    .page {
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ---------- Top brand only ---------- */
    .nav {
      padding: 32px 0 0 67px;
    }
    .brand { display: inline-flex; align-items: center; gap: 14px; }
    .brand-mark {
      width: 45px; height: 45px; border-radius: 12px;
      background: var(--color-label-normal); color: #fff;
      display: grid; place-items: center;
      font: 800 22px/1 var(--font-family-base);
      letter-spacing: 0;
    }
    .brand-name {
      font: 800 29px/1 var(--font-family-base);
      letter-spacing: -0.02em;
    }
    .brand-name b { color: var(--color-primary-normal); }

    /* ---------- Main ---------- */
    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 190px 67px 84px;
    }
    .shell {
      width: 100%;
      max-width: 1856px;
      display: grid;
      grid-template-columns: minmax(0, 760px) 816px;
      gap: 280px;
      align-items: center;
      justify-content: center;
    }

    /* ---------- Hero side ---------- */
    .hero h1 {
      font: 800 69px/1.28 var(--font-family-base);
      letter-spacing: -0.03em;
      color: var(--color-label-normal);
      text-wrap: balance;
      margin: 0;
    }
    .hero { padding-left: 84px; }
    .hero h1 em {
      font-style: normal;
      color: var(--color-primary-normal);
    }
    .benefits {
      margin-top: 59px;
      display: flex; flex-direction: column; gap: 22px;
    }
    .benefit {
      display: flex; gap: 19px; align-items: center;
      font: 500 25px/34px var(--font-family-base);
      color: var(--color-label-neutral);
    }
    .benefit .ic {
      flex: 0 0 36px;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--color-primary-bg);
      color: var(--color-primary-normal);
      display: grid; place-items: center;
    }
    .benefit .ic svg { width: 16px; height: 16px; }
    .benefit b { color: var(--color-label-normal); font-weight: 700; }

    /* ---------- Form ---------- */
    .form-card {
      width: 816px;
      min-height: 954px;
      background: #fff;
      border: 1px solid rgba(112,115,124,0.18);
      border-radius: 36px;
      padding: 58px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.04), 0 18px 36px rgba(0,0,0,0.10);
    }
    .form-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 47px;
    }
    .form-head .title {
      font: 800 34px/1 var(--font-family-base);
      letter-spacing: -0.019em;
    }
    .seats {
      display: inline-flex; align-items: center; gap: 12px;
      height: 40px;
      padding: 0 18px; border-radius: var(--radius-full);
      background: var(--color-fill-normal);
      font: 700 18px/1 var(--font-family-base);
      letter-spacing: 0.025em;
      color: var(--color-label-neutral);
    }
    .seats .num { color: var(--color-primary-normal); font-weight: 700; }

    .field { display: flex; flex-direction: column; gap: 12px; margin-bottom: 26px; }
    .field label {
      font: 700 21px/1 var(--font-family-base);
      letter-spacing: 0.019em;
      color: var(--color-label-normal);
      display: flex; align-items: center; gap: 6px;
    }
    .field label .req { color: var(--color-status-negative); font-weight: 700; }
    .field label .helper {
      margin-left: auto;
      font: 600 18px/1 var(--font-family-base);
      letter-spacing: 0.025em;
      color: var(--color-label-alternative);
    }
    .input {
      width: 100%;
      height: 84px;
      padding: 0 27px;
      border: 1px solid var(--color-line-normal-normal);
      border-radius: 20px;
      background: #fff;
      font: 500 23px/1 var(--font-family-base);
      letter-spacing: 0.005em;
      color: var(--color-label-normal);
      outline: none;
      transition: border-color 160ms ease-out, box-shadow 160ms ease-out;
    }
    .input::placeholder { color: rgba(55,56,60,0.24); }
    .input:hover { border-color: var(--color-line-solid-normal); }
    .input:focus {
      border-color: var(--color-primary-normal);
      box-shadow: 0 0 0 4px rgba(0,102,255,0.12);
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    .chips {
      display: flex; flex-wrap: wrap; gap: 14px;
      padding: 20px;
      border: 1px solid var(--color-line-normal-normal);
      border-radius: 20px;
      background: #fff;
      min-height: 157px;
      align-items: flex-start; align-content: flex-start;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 10px;
      height: 50px; padding: 0 21px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-line-normal-normal);
      background: #fff;
      font: 600 22px/1 var(--font-family-base);
      letter-spacing: 0.019em;
      color: var(--color-label-neutral);
      cursor: pointer;
      transition: background 140ms ease-out, color 140ms ease-out, border-color 140ms ease-out;
      user-select: none;
    }
    .chip:hover { background: var(--color-fill-normal); }
    .chip.on {
      background: var(--color-label-normal); border-color: var(--color-label-normal);
      color: #fff;
    }
    .chip .x { opacity: 0.7; font-weight: 800; }

    .chip-add {
      display: inline-flex; align-items: center;
      height: 50px; padding: 0 23px;
      gap: 10px;
      border-radius: var(--radius-full);
      border: 1px dashed var(--color-line-normal-normal);
      background: transparent;
      font: 600 20px/1 var(--font-family-base);
      color: var(--color-label-alternative);
    }
    .chip-add input {
      border: none; background: transparent; outline: none;
      font: inherit; color: var(--color-label-normal);
      width: 174px;
    }
    .suggestions {
      border: none;
      padding: 0;
      margin-top: 21px;
      background: transparent;
      min-height: 113px;
      gap: 14px;
    }

    .submit {
      margin-top: 15px;
      width: 100%;
      height: 90px;
      border: none; border-radius: 20px;
      background: var(--color-primary-normal); color: #fff;
      font: 700 22px/1 var(--font-family-base);
      letter-spacing: 0.005em; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      transition: background-color 160ms ease-out;
    }
    .submit:hover { background: var(--color-primary-strong); }
    .submit:disabled {
      background: #f0f1f2;
      color: rgba(55,56,60,0.18);
      cursor: not-allowed;
    }
    .submit svg { width: 20px; height: 20px; }
    .form-error {
      margin: -2px 0 16px;
      font: 600 14px/22px var(--font-family-base);
      color: var(--color-status-negative);
    }

    @media (max-width: 1500px) {
      main { padding-top: 70px; }
      .shell {
        max-width: 1120px;
        grid-template-columns: minmax(0, 480px) 510px;
        gap: 130px;
      }
      .hero { padding-left: 0; }
      .hero h1 { font-size: 48px; line-height: 1.22; }
      .benefits { margin-top: 47px; gap: 15px; }
      .benefit { font-size: 16px; line-height: 24px; gap: 13px; }
      .benefit .ic { width: 24px; height: 24px; flex-basis: 24px; }
      .benefit .ic svg { width: 13px; height: 13px; }
      .form-card {
        width: 510px;
        min-height: 630px;
        border-radius: 24px;
        padding: 36px;
      }
      .form-head { margin-bottom: 32px; }
      .form-head .title { font-size: 23px; }
      .seats { height: 26px; padding: 0 12px; gap: 8px; font-size: 12px; }
      .field { gap: 9px; margin-bottom: 21px; }
      .field label { font-size: 13px; }
      .field label .helper { font-size: 12px; }
      .input { height: 56px; padding: 0 18px; border-radius: 14px; font-size: 15px; }
      .field-row { gap: 15px; }
      .chips { gap: 9px; padding: 14px; border-radius: 14px; min-height: 101px; }
      .chip { height: 34px; padding: 0 14px; gap: 6px; font-size: 14px; }
      .chip-add { height: 34px; padding: 0 14px; gap: 7px; font-size: 13px; }
      .chip-add input { width: 114px; }
      .suggestions { margin-top: 14px; min-height: 74px; gap: 9px; }
      .submit { height: 60px; border-radius: 14px; font-size: 15px; margin-top: 8px; }
      .submit svg { width: 16px; height: 16px; }
    }

    @media (max-width: 900px) {
      .nav { padding-left: 40px; }
      main { padding: 72px 40px 64px; }
      .shell {
        grid-template-columns: minmax(0, 1fr);
        gap: 56px;
        max-width: 776px;
      }
      .hero h1 { font-size: 54px; }
      .form-card { width: 100%; }
    }

    /* Success state */
    .success {
      text-align: center;
      padding: 16px 4px 4px;
    }
    .success .check-big {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--color-primary-bg);
      color: var(--color-primary-normal);
      display: grid; place-items: center; margin: 0 auto 16px;
    }
    .success h3 {
      font: 700 22px/1.35 var(--font-family-base);
      letter-spacing: -0.019em;
      margin: 0;
    }
    .success p {
      margin: 12px 0 0;
      font: 500 14px/22px var(--font-family-base);
      color: var(--color-label-neutral);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div class="page">

  <header class="nav">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-name">price<b>db</b></div>
    </div>
  </header>

  <main>
    <div class="shell">

      <section class="hero">
        <h1>
          SaaS 계약,<br/>
          옆 회사는 <em>얼마</em>에<br/>
          했는지 알고 싶지 않아요?
        </h1>

        <div class="benefits">
          <div class="benefit">
            <span class="ic">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>
            </span>
            <span>베타 파트너 <b>50곳 한정</b></span>
          </div>
          <div class="benefit">
            <span class="ic">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>
            </span>
            <span><b>6개월 수수료 무료</b></span>
          </div>
        </div>
      </section>

      <div id="apply-mount"></div>

    </div>
  </main>

</div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SUPABASE_URL = "https://xahfpbptldbjidoaoblo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhaGZwYnB0bGRiamlkb2FvYmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzODM4ODMsImV4cCI6MjA5Mzk1OTg4M30.pkdrwP27xfoqN8SHH_OcXNUqvMxuEiFtw95BBlxG0rA";
const SUPABASE_TABLE = "beta_partners";
const TOTAL_SEATS = 50;
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SAAS_PRESETS = [
  "Slack","Notion","Figma","Linear","Datadog","GitHub",
  "Zoom","Salesforce","HubSpot","Google Workspace"
];

function ApplyForm() {
  const [name, setName] = useState("");
  const [company, setCompany] = useState("");
  const [email, setEmail] = useState("");
  const [tools, setTools] = useState(["Slack","Notion","Figma"]);
  const [draft, setDraft] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");
  const [remainingSeats, setRemainingSeats] = useState(null);

  const loadRemainingSeats = async () => {
    const { count, error } = await supabaseClient
      .from(SUPABASE_TABLE)
      .select("id", { count: "exact", head: true });

    if (error) {
      console.error(error);
      return;
    }

    setRemainingSeats(Math.max(TOTAL_SEATS - (count || 0), 0));
  };

  useEffect(() => {
    loadRemainingSeats();
  }, []);

  const emailValid = useMemo(
    () => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email),
    [email]
  );
  const ready = name.trim() && company.trim() && emailValid && tools.length > 0;

  const toggleTool = (t) => {
    setTools(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
  };
  const addDraft = () => {
    const v = draft.trim();
    if (!v) return;
    if (!tools.includes(v)) setTools([...tools, v]);
    setDraft("");
  };
  const handleDraftKey = (e) => {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault(); addDraft();
    } else if (e.key === "Backspace" && !draft && tools.length) {
      setTools(tools.slice(0, -1));
    }
  };

  const onSubmit = async (e) => {
    e.preventDefault();
    if (!ready) return;
    setSubmitError("");

    if (!SUPABASE_ANON_KEY) {
      setSubmitError("Supabase anon public key를 설정해주세요.");
      return;
    }

    try {
      setSubmitting(true);
      const { error } = await supabaseClient.from(SUPABASE_TABLE).insert({
        name: name.trim(),
        company: company.trim(),
        email: email.trim(),
        tools
      });

      if (error) throw error;
      setRemainingSeats(prev => prev === null ? prev : Math.max(prev - 1, 0));
      setSubmitted(true);
    } catch (error) {
      setSubmitError(error?.message || "신청 저장에 실패했습니다. 잠시 후 다시 시도해주세요.");
      console.error(error);
    } finally {
      setSubmitting(false);
    }
  };

  const suggestions = SAAS_PRESETS.filter(t => !tools.includes(t)).slice(0, 7);

  if (submitted) {
    return (
      <div className="form-card">
        <div className="success">
          <div className="check-big">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5 9-11"/></svg>
          </div>
          <h3>베타 파트너로 참여해주셔서 감사합니다.</h3>
          <p>1일 내로 연락드리겠습니다.</p>
        </div>
      </div>
    );
  }

  return (
    <form className="form-card" onSubmit={onSubmit} noValidate>
      <div className="form-head">
        <div className="title">베타 파트너 신청</div>
        <div className="seats">
          남은 좌석 <span className="num">{remainingSeats ?? "-"}</span> / {TOTAL_SEATS}
        </div>
      </div>

      <div className="field-row">
        <div className="field">
          <label>이름 <span className="req">*</span></label>
          <input
            className="input" type="text"
            placeholder="홍길동"
            value={name} onChange={e=>setName(e.target.value)}
            autoComplete="name"
          />
        </div>
        <div className="field">
          <label>회사명 <span className="req">*</span></label>
          <input
            className="input" type="text"
            placeholder="(주)원티드랩"
            value={company} onChange={e=>setCompany(e.target.value)}
            autoComplete="organization"
          />
        </div>
      </div>

      <div className="field">
        <label>
          이메일 <span className="req">*</span>
        </label>
        <input
          className="input" type="email"
          placeholder="name@company.com"
          value={email} onChange={e=>setEmail(e.target.value)}
          autoComplete="email"
        />
      </div>

      <div className="field">
        <label>
          주요 사용 SaaS 툴 <span className="req">*</span>
          <span className="helper">{tools.length}개 선택됨</span>
        </label>
        <div className="chips">
          {tools.map(t => (
            <span key={t} className="chip on" onClick={()=>toggleTool(t)}>
              {t} <span className="x">×</span>
            </span>
          ))}
          <span className="chip-add">
            <span style={{opacity: 0.6}}>+</span>
            <input
              placeholder="직접 입력 후 Enter"
              value={draft}
              onChange={e=>setDraft(e.target.value)}
              onKeyDown={handleDraftKey}
              onBlur={addDraft}
            />
          </span>
        </div>
        {suggestions.length > 0 && (
          <div className="chips suggestions">
            {suggestions.map(t => (
              <span key={t} className="chip" onClick={()=>toggleTool(t)}>+ {t}</span>
            ))}
          </div>
        )}
      </div>

      {submitError && <div className="form-error">{submitError}</div>}

      <button className="submit" type="submit" disabled={!ready || submitting}>
        {submitting ? "신청 중..." : "베타 파트너 신청하기"}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
      </button>
    </form>
  );
}

ReactDOM.createRoot(document.getElementById("apply-mount")).render(<ApplyForm />);
</script>

</body>
</html>
